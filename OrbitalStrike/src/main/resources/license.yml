# HubertStudios License Manager settings for OrbitalStrike.
# Product name in the dashboard must be exactly: OrbitalStrike

license: "put-license-here"
worker-url: "https://your-license-worker.example.com"

# Paste the public key generated by backend/scripts/setup-tool.html.
# The public key is not secret, but it must match the Worker PRIVATE_KEY.
public-key-pem: |
  -----BEGIN PUBLIC KEY-----
  PASTE_PUBLIC_KEY_HERE
  -----END PUBLIC KEY-----

recheck-interval-minutes: 60

# Optional identifiers sent to the license backend for server allow/block lists.
server:
  public-ip: ""
  hostname: ""
  domain: ""
