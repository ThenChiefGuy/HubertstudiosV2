# HubertStudios License Manager settings for CoreGuard.
# Product name in the dashboard must be exactly: CoreGuard

license: "put-license-here"
worker-url: "https://your-license-worker.example.com"

# Paste the public key generated by backend/scripts/setup-tool.html.
# The public key is not secret, but it must match the Worker PRIVATE_KEY.
public-key-pem: |
  -----BEGIN PUBLIC KEY-----
  PASTE_PUBLIC_KEY_HERE
  -----END PUBLIC KEY-----

recheck-interval-minutes: 60

# Optional identifiers. Current CoreGuard validation uses bind IP, port, and server name.
# Keep these here for consistency with the universal client template.
server:
  public-ip: ""
  hostname: ""
  domain: ""
